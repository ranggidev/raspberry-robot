services:
  robot-eyes:
    build: .
    container_name: robot-eyes
    environment:
      - DISPLAY=${DISPLAY}
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - OLLAMA_BASE_URL=http://localhost:11434
      - OLLAMA_MODEL=gemma3:1b
      - PYTHONUNBUFFERED=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - /run/user/1000/pulse:/run/user/1000/pulse:ro
    devices:
      - /dev/snd:/dev/snd
    network_mode: host
